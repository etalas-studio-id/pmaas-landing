    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PMaaS",
        "url": "https://pmaas.io",
        "logo": "https://pmaas.io/logo.png",
        "description": "Product Management as a Service for startups and enterprises.",
        "sameAs": [
          "https://twitter.com/pmaas",
          "https://linkedin.com/company/pmaas",
          "https://github.com/pmaas"
        ],
        "offers": {
          "@type": "Offer",
          "price": "15000000",
          "priceCurrency": "IDR",
          "name": "Standard Plan",
          "description": "One active request at a time, 48h delivery."
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Why wouldn't I just hire a full-time Product Manager?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hiring a senior PM costs $150k+ annually plus benefits, and it takes months to find the right one. With PMaaS, you get immediate access to a full pod of talent for a fraction of the cost."
            }
          },
          {
            "@type": "Question",
            "name": "Who are the Product Managers?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We provide a blended team structure. Your account is overseen by a Veteran Senior PM (ex-Unicorn/Big Tech) who handles strategy, while execution is driven by efficient Mid-level and Associate PMs. This ensures you get high-level strategy backed by cost-effective execution."
            }
          }
        ]
      }
    ]
    </script>

    <title>PMaaS | World-class Product Management on Demand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              background: 'rgb(var(--background) / <alpha-value>)',
              surface: 'rgb(var(--surface) / <alpha-value>)',
              surfaceHighlight: 'rgb(var(--surface-highlight) / <alpha-value>)',
              primary: 'rgb(var(--primary) / <alpha-value>)',
              primaryForeground: 'rgb(var(--primary-foreground) / <alpha-value>)',
              accent: '#3b82f6',
              muted: 'rgb(var(--muted) / <alpha-value>)',
              border: 'rgb(var(--border) / <alpha-value>)',
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-down': 'slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'zoom-in': 'zoomIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'marquee': 'marquee 40s linear infinite',
              'float': 'float 8s ease-in-out infinite',
              'shimmer': 'shimmer 2.5s linear infinite',
              'pop-in': 'popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'shimmer-pulse': 'shimmerPulse 3s ease-in-out infinite',
              'progress-fill': 'progressFill 1.5s ease-out forwards',
              'word-bounce': 'wordBounce 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'sparkle': 'sparkle 2s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(30px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              slideDown: {
                '0%': { transform: 'translateY(-20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              zoomIn: {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              },
              popIn: {
                '0%': { opacity: '0', transform: 'translateY(20px) rotate(-5deg)' },
                '100%': { opacity: '1', transform: 'translateY(0) rotate(0)' },
              },
              shimmerPulse: {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '0.8', transform: 'scale(1.05)' },
              },
              progressFill: {
                '0%': { width: '0%' },
                '100%': { width: 'var(--target-width, 100%)' },
              },
              wordBounce: {
                '0%': { opacity: '0', transform: 'translateY(40px) rotate(10deg)' },
                '50%': { opacity: '1', transform: 'translateY(-10px) rotate(-5deg)' },
                '70%': { transform: 'translateY(5px) rotate(2deg)' },
                '100%': { opacity: '1', transform: 'translateY(0) rotate(0)' },
              },
              sparkle: {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '0.7', transform: 'scale(1.2) rotate(15deg)' },
              }
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Mode (Default in Root now) */
        --background: 255 255 255; /* Pure White */
        --surface: 249 250 251; /* Gray 50 */
        --surface-highlight: 243 244 246; /* Gray 100 */
        --primary: 15 23 42; /* Slate 900 */
        --primary-foreground: 255 255 255; 
        --muted: 100 116 139; /* Slate 500 */
        --border: 226 232 240; /* Slate 200 */
      }

      [data-theme='dark'] {
        /* Dark Mode Override */
        --background: 10 10 10; 
        --surface: 23 23 23; 
        --surface-highlight: 38 38 38; 
        --primary: 255 255 255; 
        --primary-foreground: 0 0 0; 
        --muted: 161 161 170; 
        --border: 39 39 42; 
      }

      body {
        /* Subtle Gradient Background */
        background-image: linear-gradient(to bottom right, rgb(var(--surface)), rgb(var(--background)));
        background-attachment: fixed;
        color: rgb(var(--primary));
        transition: color 0.3s ease;
      }
      
      html {
        scroll-padding-top: 80px;
      }
      
      h1, h2, h3, h4, h5, h6 {
        text-wrap: balance;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--surface-highlight));
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--muted));
      }
      
      /* Performance optimizations */
      .gpu-accelerated {
        transform: translateZ(0);
        backface-visibility: hidden;
        perspective: 1000px;
      }

      /* Mask utility for seamless marquees */
      .mask-linear-fade {
        mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      }
    </style>
